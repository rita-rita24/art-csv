<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArtCSV — CSV Editor</title>
  <style>
    /* ========================================
       CSS Reset & Base
       ======================================== */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-bg: #fafafa;
      --color-white: #ffffff;
      --color-text: #1a1a1a;
      --color-text-secondary: #6b7280;
      --color-text-tertiary: #9ca3af;
      --color-border: #e5e7eb;
      --color-border-light: #f3f4f6;
      --color-accent: #111827;
      --color-accent-soft: #374151;
      --color-surface: #f9fafb;
      --color-surface-elevated: #ffffff;
      --font-sans: "Inter", "Helvetica Neue", "Arial", "Hiragino Sans",
        "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      --font-mono: "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono",
        "Courier New", monospace;
      --space-xs: 0.25rem;
      --space-sm: 0.5rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2rem;
      --space-2xl: 3rem;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.08);
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.7;
      color: var(--color-text);
      background-color: var(--color-bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ========================================
       Header
       ======================================== */
    .header {
      background: rgba(250, 250, 250, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--color-border-light);
      flex-shrink: 0;
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 var(--space-xl);
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: var(--space-lg);
    }

    .logo {
      font-size: 1.125rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--color-accent);
    }

    .header-divider {
      width: 1px;
      height: 20px;
      background: var(--color-border);
    }

    .header-page {
      font-size: 0.8125rem;
      color: var(--color-text-tertiary);
      font-weight: 500;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }

    .header-link {
      font-size: 0.8125rem;
      color: var(--color-text-tertiary);
      transition: color var(--transition);
    }

    .header-link:hover {
      color: var(--color-text);
    }

    /* ========================================
       Main Editor
       ======================================== */
    .editor-main {
      flex: 1;
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
      padding: var(--space-xl);
      display: flex;
      flex-direction: column;
      gap: var(--space-xl);
    }

    /* ---- Toolbar ---- */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-md);
      flex-wrap: wrap;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .toolbar-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: 0.4375rem 0.875rem;
      font-size: 0.8125rem;
      font-family: inherit;
      font-weight: 500;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      background: var(--color-white);
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .toolbar-btn:hover {
      background: var(--color-surface);
      color: var(--color-text);
      box-shadow: var(--shadow-sm);
    }

    .toolbar-btn:active {
      transform: scale(0.98);
    }

    .toolbar-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .toolbar-btn-primary {
      background: var(--color-accent);
      color: var(--color-white);
      border-color: var(--color-accent);
    }

    .toolbar-btn-primary:hover {
      background: var(--color-accent-soft);
      color: var(--color-white);
    }

    .toolbar-separator {
      width: 1px;
      height: 24px;
      background: var(--color-border);
      margin: 0 var(--space-xs);
    }

    .toolbar-status {
      font-size: 0.75rem;
      color: var(--color-text-tertiary);
      margin-left: var(--space-sm);
    }

    /* ---- Editor panels ---- */
    .editor-panels {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-xl);
      min-height: 0;
    }

    .editor-panel {
      display: flex;
      flex-direction: column;
      background: var(--color-surface-elevated);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      min-height: 400px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.625rem var(--space-lg);
      border-bottom: 1px solid var(--color-border-light);
      background: var(--color-surface);
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-tertiary);
    }

    .panel-badge {
      font-size: 0.6875rem;
      color: var(--color-text-tertiary);
      background: var(--color-bg);
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      border: 1px solid var(--color-border-light);
    }

    .panel-body {
      flex: 1;
      overflow: auto;
    }

    /* ---- Textarea ---- */
    .csv-textarea {
      width: 100%;
      height: 100%;
      min-height: 360px;
      padding: var(--space-md) var(--space-lg);
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      line-height: 1.9;
      color: var(--color-text);
      background: transparent;
      border: none;
      resize: none;
      outline: none;
      tab-size: 4;
    }

    .csv-textarea::placeholder {
      color: var(--color-text-tertiary);
    }

    /* ---- Table ---- */
    .table-container {
      overflow: auto;
      height: 100%;
    }

    .csv-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8125rem;
    }

    .csv-table th,
    .csv-table td {
      padding: 0.5rem var(--space-md);
      text-align: left;
      border-bottom: 1px solid var(--color-border-light);
      white-space: nowrap;
    }

    .csv-table th {
      font-weight: 600;
      font-size: 0.75rem;
      color: var(--color-text-secondary);
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .csv-table td {
      color: var(--color-text);
      font-family: var(--font-mono);
      font-size: 0.8125rem;
    }

    .csv-table tbody tr:hover {
      background: var(--color-surface);
    }

    .csv-table tbody tr:last-child td {
      border-bottom: none;
    }

    .csv-table .row-num {
      color: var(--color-text-tertiary);
      font-size: 0.6875rem;
      text-align: right;
      padding-right: var(--space-sm);
      user-select: none;
      width: 36px;
      border-right: 1px solid var(--color-border-light);
    }

    /* ---- Empty state ---- */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 200px;
      color: var(--color-text-tertiary);
      gap: var(--space-sm);
      padding: var(--space-xl);
    }

    .empty-state svg {
      width: 32px;
      height: 32px;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 0.8125rem;
    }

    /* ========================================
       Footer
       ======================================== */
    .footer {
      flex-shrink: 0;
      padding: var(--space-md) var(--space-xl);
      border-top: 1px solid var(--color-border-light);
    }

    .footer-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-copy {
      font-size: 0.75rem;
      color: var(--color-text-tertiary);
    }

    .footer-link {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      font-size: 0.75rem;
      color: var(--color-text-tertiary);
      transition: color var(--transition);
    }

    .footer-link:hover {
      color: var(--color-text);
    }

    .footer-link svg {
      width: 14px;
      height: 14px;
    }

    /* ========================================
       Responsive
       ======================================== */
    @media (max-width: 768px) {
      .editor-main {
        padding: var(--space-md);
      }

      .editor-panels {
        grid-template-columns: 1fr;
      }

      .editor-panel {
        min-height: 280px;
      }

      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .toolbar-left,
      .toolbar-right {
        flex-wrap: wrap;
      }

      .toolbar-btn {
        flex: 1;
        justify-content: center;
        min-width: 0;
      }

      .header-inner {
        padding: 0 var(--space-md);
      }

      .footer {
        padding: var(--space-md);
      }

      .footer-inner {
        flex-direction: column;
        gap: var(--space-sm);
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <!-- ======== Header ======== -->
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <a href="index.html" class="logo">ArtCSV</a>
        <div class="header-divider"></div>
        <span class="header-page">CSV Editor</span>
      </div>
      <div class="header-right">
        <a href="index.html" class="header-link">ホームに戻る</a>
      </div>
    </div>
  </header>

  <!-- ======== Editor ======== -->
  <main class="editor-main">

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-left">
        <button class="toolbar-btn" id="parseBtn">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 6 8 10 12 6"/>
          </svg>
          パース
        </button>
        <button class="toolbar-btn" id="copyBtn">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="5" width="8" height="8" rx="1"/>
            <path d="M3 11V4a1 1 0 011-1h7"/>
          </svg>
          コピー
        </button>
        <button class="toolbar-btn" id="clearBtn">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="4" x2="12" y2="12"/>
            <line x1="12" y1="4" x2="4" y2="12"/>
          </svg>
          クリア
        </button>
        <div class="toolbar-separator"></div>
        <label class="toolbar-btn" id="openFileBtn">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 13V5a1 1 0 011-1h3l2 2h5a1 1 0 011 1v6a1 1 0 01-1 1H3a1 1 0 01-1-1z"/>
          </svg>
          ファイルを開く
          <input type="file" accept=".csv,.tsv,.txt" id="fileInput" hidden>
        </label>
        <span class="toolbar-status" id="statusText"></span>
      </div>
      <div class="toolbar-right">
        <button class="toolbar-btn toolbar-btn-primary" id="downloadCsvBtn">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 2v8M5 7l3 3 3-3"/>
            <path d="M3 12h10"/>
          </svg>
          CSVをダウンロード
        </button>
      </div>
    </div>

    <!-- Panels -->
    <div class="editor-panels">

      <!-- Input panel -->
      <div class="editor-panel">
        <div class="panel-header">
          <span class="panel-title">入力</span>
          <span class="panel-badge" id="lineCount">0 行</span>
        </div>
        <div class="panel-body">
          <textarea class="csv-textarea" id="csvInput" placeholder="ここにCSVデータを貼り付けてください…&#10;&#10;名前,年齢,都市&#10;田中太郎,28,東京&#10;鈴木花子,34,大阪" spellcheck="false">名前,年齢,都市
田中太郎,28,東京
鈴木花子,34,大阪
佐藤次郎,22,福岡</textarea>
        </div>
      </div>

      <!-- Preview panel -->
      <div class="editor-panel">
        <div class="panel-header">
          <span class="panel-title">プレビュー</span>
          <span class="panel-badge" id="rowColCount">0 行 × 0 列</span>
        </div>
        <div class="panel-body">
          <div class="table-container" id="tableContainer">
            <div class="empty-state" id="emptyState">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <path d="M3 9h18M3 15h18M9 3v18M15 3v18"/>
              </svg>
              <p>CSVを入力してパースしてください</p>
            </div>
            <table class="csv-table" id="csvTable" style="display:none">
              <thead></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- ======== Footer ======== -->
  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-copy">&copy; 2026 ArtCSV</span>
      <a href="https://github.com/rita-rita24/art-csv" class="footer-link" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        GitHub
      </a>
    </div>
  </footer>

  <!-- ======== Scripts ======== -->
  <script>
    (function () {
      "use strict";

      var csvInput = document.getElementById("csvInput");
      var csvTable = document.getElementById("csvTable");
      var emptyState = document.getElementById("emptyState");
      var lineCount = document.getElementById("lineCount");
      var rowColCount = document.getElementById("rowColCount");
      var statusText = document.getElementById("statusText");

      /* ---- CSV Parser ---- */
      function parseCSV(text) {
        var lines = text.trim().split("\n");
        return lines.map(function (line) {
          var result = [];
          var current = "";
          var inQuotes = false;
          for (var i = 0; i < line.length; i++) {
            var ch = line[i];
            if (inQuotes) {
              if (ch === '"' && line[i + 1] === '"') {
                current += '"';
                i++;
              } else if (ch === '"') {
                inQuotes = false;
              } else {
                current += ch;
              }
            } else {
              if (ch === '"') {
                inQuotes = true;
              } else if (ch === ",") {
                result.push(current);
                current = "";
              } else {
                current += ch;
              }
            }
          }
          result.push(current);
          return result;
        });
      }

      function escapeHTML(str) {
        var div = document.createElement("div");
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
      }

      /* ---- Update line count ---- */
      function updateLineCount() {
        var text = csvInput.value;
        var lines = text ? text.split("\n").length : 0;
        lineCount.textContent = lines + " 行";
      }

      /* ---- Render table ---- */
      function renderTable(rows) {
        var thead = csvTable.querySelector("thead");
        var tbody = csvTable.querySelector("tbody");

        if (rows.length === 0) {
          csvTable.style.display = "none";
          emptyState.style.display = "flex";
          rowColCount.textContent = "0 行 × 0 列";
          return;
        }

        csvTable.style.display = "table";
        emptyState.style.display = "none";

        var header = rows[0];
        var body = rows.slice(1);
        var cols = header.length;

        rowColCount.textContent = body.length + " 行 × " + cols + " 列";

        thead.innerHTML =
          "<tr><th class=\"row-num\">#</th>" +
          header
            .map(function (h) {
              return "<th>" + escapeHTML(h) + "</th>";
            })
            .join("") +
          "</tr>";

        tbody.innerHTML = body
          .map(function (row, idx) {
            return (
              "<tr><td class=\"row-num\">" + (idx + 1) + "</td>" +
              row
                .map(function (cell) {
                  return "<td>" + escapeHTML(cell) + "</td>";
                })
                .join("") +
              "</tr>"
            );
          })
          .join("");
      }

      function doParse() {
        var text = csvInput.value;
        if (!text.trim()) {
          renderTable([]);
          return;
        }
        var rows = parseCSV(text);
        renderTable(rows);
        showStatus("パース完了");
      }

      function showStatus(msg) {
        statusText.textContent = msg;
        setTimeout(function () {
          statusText.textContent = "";
        }, 2000);
      }

      /* ---- Event listeners ---- */
      document.getElementById("parseBtn").addEventListener("click", doParse);

      csvInput.addEventListener("input", updateLineCount);

      document.getElementById("clearBtn").addEventListener("click", function () {
        csvInput.value = "";
        renderTable([]);
        updateLineCount();
        showStatus("クリアしました");
      });

      document.getElementById("copyBtn").addEventListener("click", function () {
        var text = csvInput.value;
        if (navigator.clipboard) {
          navigator.clipboard.writeText(text).then(function () {
            showStatus("コピーしました");
          });
        }
      });

      document.getElementById("fileInput").addEventListener("change", function (e) {
        var file = e.target.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function (ev) {
          csvInput.value = ev.target.result;
          updateLineCount();
          doParse();
          showStatus(file.name + " を読み込みました");
        };
        reader.readAsText(file);
        e.target.value = "";
      });

      document.getElementById("downloadCsvBtn").addEventListener("click", function () {
        var text = csvInput.value;
        if (!text.trim()) return;
        var blob = new Blob([text], { type: "text/csv;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = "data.csv";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showStatus("ダウンロードしました");
      });

      /* ---- Initial render ---- */
      updateLineCount();
      doParse();
    })();
  </script>
</body>
</html>
